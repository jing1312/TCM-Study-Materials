<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中医药学概论 · 3天备考全套</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', sans-serif; background: #FFF8DC; }
        .tab-bar {
            position: sticky; top: 0; z-index: 9999;
            display: flex;
            background: linear-gradient(135deg, #2D1810, #4a2c1a);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .tab-btn {
            flex: 1; padding: 14px 8px; border: none; background: transparent;
            color: rgba(255,248,220,0.55); font-size: 15px; font-weight: 600;
            cursor: pointer; transition: all 0.3s; position: relative;
            font-family: 'Noto Sans SC', sans-serif; letter-spacing: 1px;
        }
        .tab-btn:hover { color: #FFF8DC; background: rgba(212,160,23,0.1); }
        .tab-btn.active { color: #D4A017; background: rgba(212,160,23,0.15); }
        .tab-btn.active::after {
            content: ''; position: absolute; bottom: 0; left: 20%; width: 60%; height: 3px;
            background: linear-gradient(90deg, #D4A017, #C41E3A); border-radius: 3px 3px 0 0;
        }
        .tab-frame {
            display: none; width: 100%; border: none;
            height: calc(100vh - 50px); min-height: 600px;
        }
        .tab-frame.active { display: block; }
    </style>
</head>
<body>
    <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab(0)">📋 学习计划</button>
        <button class="tab-btn" onclick="switchTab(1)">🃏 速记卡片</button>
        <button class="tab-btn" onclick="switchTab(2)">📖 重点口诀</button>
        <button class="tab-btn" onclick="switchTab(3)">✍️ 自测模拟</button>
    </div>

    <iframe class="tab-frame active" src="3天学习计划.html"></iframe>
    <iframe class="tab-frame" src="速记卡片.html"></iframe>
    <iframe class="tab-frame" src="重点难点口诀.html"></iframe>
    <iframe class="tab-frame" src="自测模拟题.html"></iframe>

    <script>
    function switchTab(idx) {
        document.querySelectorAll('.tab-btn').forEach(function(b, i) {
            b.classList.toggle('active', i === idx);
        });
        document.querySelectorAll('.tab-frame').forEach(function(f, i) {
            f.classList.toggle('active', i === idx);
        });
    }
    </script>
</body>
</html>
